name: Build Data Wing APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git openjdk-17-jdk unzip
    
    - name: Set up Java
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        java -version
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Configure Android SDK paths
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
    
    - name: Accept ALL Android licenses FIRST
      run: |
        mkdir -p $ANDROID_HOME/licenses
        printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\n84831b9409646a918e30573bab4c9c91346d8abd' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\nd56f5187479451eabf01fb78af6dfcb131a6481e' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232' >> $ANDROID_HOME/licenses/android-sdk-license
        echo "License files written"
        ls -la $ANDROID_HOME/licenses/
    
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Build APK
      id: build
      run: |
        echo "Build started at $(date)"
        set -o pipefail
        buildozer android debug 2>&1 | tee buildozer.log
        result=${PIPESTATUS[0]}
        echo "build_exit_code=$result" >> $GITHUB_OUTPUT
        echo "Build finished at $(date) with exit code $result"
        exit $result
      timeout-minutes: 30
    
    - name: Upload build log (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer.log
        path: buildozer.log
        retention-days: 5
    
    - name: List output files
      run: |
        echo "=== bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
        echo "=== Looking for APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: datawing.apk
        path: bin/*.apk
        if-no-files-found: error
