name: Build Data Wing APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git openjdk-17-jdk unzip
    
    - name: Set up Java
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        java -version
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Configure Android SDK paths
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
    
    - name: Accept Android licenses and install build-tools
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        
        # Write ALL known Android SDK license hashes
        mkdir -p $ANDROID_HOME/licenses
        printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee' > $ANDROID_HOME/licenses/android-sdk-license
        printf '\n84831b9409646a918e30573bab4c9c91346d8abd' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\nd56f5187479451eabf01fb78af6dfcb131a6481e' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232' >> $ANDROID_HOME/licenses/android-sdk-license
        printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' > $ANDROID_HOME/licenses/intel-android-extra-license
        printf '\n33B6E2B3' > $ANDROID_HOME/licenses/android-googletv-license
        printf '\n859f317696f67ef3d7f30a50a5560e7834b43903' > $ANDROID_HOME/licenses/android-sdk-preview-license
        printf '\n2times' > $ANDROID_HOME/licenses/mips-android-sysimage-license
        
        echo "=== Licenses written ==="
        ls -la $ANDROID_HOME/licenses/
        
        # Accept ALL licenses via yes pipe
        yes | sdkmanager --licenses 2>&1 | tail -5
        
        echo "=== Installing build-tools 37.0.0 ==="
        sdkmanager "build-tools;37.0.0" "platforms;android-34" 2>&1 | tail -10
        
        echo "=== Installed packages ==="
        sdkmanager --list_installed 2>&1 | grep -E "build-tools|platforms"
    
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Build APK
      id: build
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        echo "=== Set up buildozer SDK directory ==="
        mkdir -p ~/.buildozer/android/platform/android-sdk
        
        # Copy licenses so buildozer accepts SDK packages
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || true
        
        # Copy the build-tools that we installed via sdkmanager
        cp -r $ANDROID_HOME/build-tools ~/.buildozer/android/platform/android-sdk/ 2>/dev/null || true
        cp -r $ANDROID_HOME/platforms ~/.buildozer/android/platform/android-sdk/ 2>/dev/null || true
        cp -r $ANDROID_HOME/cmdline-tools ~/.buildozer/android/platform/android-sdk/ 2>/dev/null || true
        
        echo "=== buildozer SDK contents ==="
        ls ~/.buildozer/android/platform/android-sdk/ 2>/dev/null || echo "(empty)"
        ls ~/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || echo "(no licenses)"
        
        echo "=== Environment ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "JAVA_HOME=$JAVA_HOME"
        which java
        java -version 2>&1 | head -1
        ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools found"
        
        echo "=== Starting build at $(date) ==="
        set -o pipefail
        buildozer android debug 2>&1 | tee buildozer.log
        result=${PIPESTATUS[0]}
        echo "Build finished at $(date) with exit code $result"
        exit $result
      timeout-minutes: 30
    
    - name: Upload build log (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer.log
        path: buildozer.log
        retention-days: 5
    
    - name: List output files
      run: |
        echo "=== bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
        echo "=== Looking for APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: datawing.apk
        path: bin/*.apk
        if-no-files-found: error
